<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Orbit™ — Helon Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060818;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.09);
    --visual: #FF6B9D;
    --aural: #A78BFA;
    --read: #2DD4BF;
    --kine: #FBBF24;
    --text: #E8EEFF;
    --muted: rgba(232,238,255,0.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── STARS ── */
  #stars-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── NEBULA GRADIENTS ── */
  .nebula {
    position: fixed; border-radius: 50%;
    filter: blur(80px); opacity: 0.18;
    pointer-events: none; z-index: 0;
  }
  .nebula-1 { width: 600px; height: 600px; background: radial-gradient(circle, #A78BFA, transparent); top: -200px; left: -200px; }
  .nebula-2 { width: 500px; height: 500px; background: radial-gradient(circle, #FF6B9D, transparent); bottom: -150px; right: -150px; }
  .nebula-3 { width: 400px; height: 400px; background: radial-gradient(circle, #2DD4BF, transparent); top: 40%; left: 60%; }

  /* ── FLOATING EMOJI PARTICLES ── */
  .emoji-particle {
    position: fixed; font-size: 1.4rem;
    pointer-events: none; z-index: 0;
    animation: floatParticle linear infinite;
    opacity: 0.25;
  }
  @keyframes floatParticle {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.25; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 30px 16px 60px;
  }

  /* ── LOGO ── */
  .logo-wrap {
    display: flex; flex-direction: column;
    align-items: center; margin-bottom: 28px;
    animation: fadeDown 0.7s ease both;
  }
  .logo-ring-outer {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #FF6B9D, #A78BFA, #2DD4BF, #FBBF24, #FF6B9D);
    display: flex; align-items: center; justify-content: center;
    animation: spinRing 4s linear infinite;
    box-shadow: 0 0 40px rgba(167,139,250,0.4);
  }
  .logo-ring-inner {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
  }
  @keyframes spinRing { to { transform: rotate(360deg); } }
  .logo-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.5rem; font-weight: 900;
    letter-spacing: 2px; margin-top: 10px;
    background: linear-gradient(90deg, #FF6B9D, #A78BFA, #2DD4BF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub {
    font-size: 0.7rem; letter-spacing: 3px;
    color: var(--muted); text-transform: uppercase; margin-top: 2px;
  }

  /* ── GLASS CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    width: 100%; max-width: 680px;
    padding: 36px 32px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.4);
    animation: fadeUp 0.5s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }

  /* ── INTRO SCREEN ── */
  .intro-headline {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    text-align: center; margin-bottom: 6px;
    color: var(--text);
  }
  .intro-sub {
    text-align: center; color: var(--muted);
    font-size: 0.9rem; margin-bottom: 28px;
  }

  /* ── MASCOT ORBS ── */
  .mascots-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 12px; margin-bottom: 28px;
  }
  .mascot-orb {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; cursor: default;
  }
  .mascot-ring {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px dashed;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: orbitSpin 8s linear infinite;
  }
  .mascot-ring::before {
    content: ''; position: absolute;
    width: 8px; height: 8px; border-radius: 50%;
    background: currentColor;
    top: -4px; left: 50%; transform: translateX(-50%);
    box-shadow: 0 0 8px 2px currentColor;
  }
  .mascot-ring.visual  { border-color: var(--visual); color: var(--visual); }
  .mascot-ring.aural   { border-color: var(--aural);  color: var(--aural);  animation-duration: 10s; }
  .mascot-ring.read    { border-color: var(--read);   color: var(--read);   animation-duration: 12s; }
  .mascot-ring.kine    { border-color: var(--kine);   color: var(--kine);   animation-duration: 6s; }
  @keyframes orbitSpin { to { transform: rotate(360deg); } }
  .mascot-emoji { font-size: 1.8rem; position: absolute; animation: counterSpin 8s linear infinite; }
  .mascot-ring.aural  .mascot-emoji { animation-duration: 10s; }
  .mascot-ring.read   .mascot-emoji { animation-duration: 12s; }
  .mascot-ring.kine   .mascot-emoji { animation-duration: 6s; }
  @keyframes counterSpin { to { transform: rotate(-360deg); } }
  .mascot-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .mascot-orb .visual-lbl { color: var(--visual); }
  .mascot-orb .aural-lbl  { color: var(--aural); }
  .mascot-orb .read-lbl   { color: var(--read); }
  .mascot-orb .kine-lbl   { color: var(--kine); }

  /* ── INPUT ── */
  .input-wrap { margin-bottom: 20px; }
  .input-wrap label { display: block; font-size: 0.8rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .input-wrap input {
    width: 100%; padding: 14px 18px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 1rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-wrap input::placeholder { color: rgba(232,238,255,0.3); }
  .input-wrap input:focus { border-color: rgba(167,139,250,0.6); box-shadow: 0 0 0 3px rgba(167,139,250,0.15); }

  /* ── BUTTONS ── */
  .btn-launch {
    width: 100%; padding: 16px;
    font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 700;
    letter-spacing: 1.5px; border: none; border-radius: 14px; cursor: pointer;
    background: linear-gradient(135deg, #A78BFA, #FF6B9D);
    color: #fff; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(167,139,250,0.35);
  }
  .btn-launch:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(167,139,250,0.5); }
  .btn-launch:active:not(:disabled) { transform: translateY(0); }
  .btn-launch:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── QUIZ SCREEN ── */
  .progress-bar-wrap { margin-bottom: 24px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 600; letter-spacing: 1px; color: var(--muted); }
  .progress-track { height: 8px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, #A78BFA, #FF6B9D);
    transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  .progress-fill::after { content: '🚀'; position: absolute; right: -2px; top: 50%; transform: translateY(-50%); font-size: 14px; }

  .mission-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 4px 10px; border-radius: 99px;
    background: rgba(167,139,250,0.15); color: #A78BFA;
    border: 1px solid rgba(167,139,250,0.3); margin-bottom: 10px;
  }
  .q-emoji { font-size: 2.4rem; display: block; margin-bottom: 8px; }
  .q-text { font-size: 1.05rem; font-weight: 700; line-height: 1.5; margin-bottom: 20px; color: var(--text); }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 22px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 14px 14px;
    background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 14px; cursor: pointer; text-align: left;
    transition: all 0.18s ease; color: var(--text);
    font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 600; line-height: 1.4;
  }
  .option-btn .opt-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 1px; }
  .option-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
  .option-btn.selected-v { background: rgba(255,107,157,0.15); border-color: var(--visual); color: #fff; }
  .option-btn.selected-a { background: rgba(167,139,250,0.15); border-color: var(--aural); color: #fff; }
  .option-btn.selected-r { background: rgba(45,212,191,0.15); border-color: var(--read); color: #fff; }
  .option-btn.selected-k { background: rgba(251,191,36,0.15); border-color: var(--kine); color: #fff; }

  .btn-next {
    width: 100%; padding: 15px;
    font-family: 'Orbitron', sans-serif; font-size: 0.88rem; font-weight: 700;
    letter-spacing: 1px; border: none; border-radius: 14px; cursor: pointer;
    background: linear-gradient(135deg, #2DD4BF, #A78BFA);
    color: #fff; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(45,212,191,0.25);
  }
  .btn-next:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(45,212,191,0.4); }
  .btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── RESULTS SCREEN ── */
  .results-header { text-align: center; margin-bottom: 28px; }
  .results-title { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 900; margin-bottom: 4px; }
  .results-name { font-size: 1rem; color: var(--muted); }
  .results-name span { color: var(--text); font-weight: 700; }

  .podium-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
  .result-card {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 20px; border-radius: 16px;
    border: 1px solid; position: relative; overflow: hidden;
  }
  .result-card::before {
    content: ''; position: absolute; inset: 0;
    background: currentColor; opacity: 0.06; pointer-events: none;
  }
  .result-card.rc-v { border-color: var(--visual); color: var(--visual); }
  .result-card.rc-a { border-color: var(--aural);  color: var(--aural); }
  .result-card.rc-r { border-color: var(--read);   color: var(--read); }
  .result-card.rc-k { border-color: var(--kine);   color: var(--kine); }
  .rc-medal { font-size: 1.8rem; flex-shrink: 0; }
  .rc-mascot { font-size: 2.2rem; flex-shrink: 0; }
  .rc-body { flex: 1; }
  .rc-type { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; opacity: 0.9; }
  .rc-desc { font-size: 0.82rem; color: var(--text); opacity: 0.8; margin: 4px 0 8px; line-height: 1.4; }
  .rc-tips { display: flex; flex-wrap: wrap; gap: 5px; }
  .rc-tip {
    font-size: 0.7rem; font-weight: 700; padding: 3px 9px;
    border-radius: 99px; border: 1px solid; opacity: 0.9;
    border-color: currentColor; color: currentColor;
    background: rgba(255,255,255,0.04);
  }
  .rc-score-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
  .rc-score-num { font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; line-height: 1; }
  .rc-score-pct { font-size: 0.7rem; opacity: 0.7; font-weight: 700; }

  /* Summary bars */
  .summary-title { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .summary-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .sum-row { display: flex; align-items: center; gap: 10px; }
  .sum-label { font-size: 0.75rem; font-weight: 700; width: 90px; flex-shrink: 0; }
  .sum-track { flex: 1; height: 8px; background: rgba(255,255,255,0.07); border-radius: 99px; overflow: hidden; }
  .sum-fill { height: 100%; border-radius: 99px; transition: width 1s cubic-bezier(0.34,1.56,0.64,1); }
  .sum-val { font-size: 0.75rem; font-weight: 700; width: 28px; text-align: right; }

  /* Action buttons */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-print {
    padding: 13px; font-family: 'Orbitron', sans-serif; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.8px; border: 1.5px solid var(--aural); border-radius: 12px;
    background: rgba(167,139,250,0.1); color: var(--aural); cursor: pointer;
    transition: all 0.2s;
  }
  .btn-print:hover { background: rgba(167,139,250,0.2); transform: translateY(-1px); }
  .btn-reset {
    padding: 13px; font-family: 'Orbitron', sans-serif; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.8px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #FF6B9D, #A78BFA); color: #fff; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 16px rgba(255,107,157,0.3);
  }
  .btn-reset:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(255,107,157,0.5); }

  /* ── CONFETTI ── */
  .confetti-piece {
    position: fixed; width: 8px; height: 8px; border-radius: 2px;
    pointer-events: none; z-index: 999;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── PRINT CERTIFICATE ── */
  @media screen { .print-cert { display: none; } }
  @media print {
    body > *:not(.print-cert) { display: none !important; }
    .print-cert {
      display: block !important;
      position: fixed; inset: 0; z-index: 9999;
    }
    #stars-canvas, .nebula, .emoji-particle { display: none; }
  }
  .print-cert {
    width: 100%; min-height: 100vh;
    background: #060818;
    font-family: 'Nunito', sans-serif; color: #E8EEFF;
    padding: 40px; position: relative;
  }
  .cert-frame {
    border: 4px solid transparent;
    background: linear-gradient(#060818, #060818) padding-box,
                linear-gradient(135deg, #FF6B9D, #A78BFA, #2DD4BF, #FBBF24) border-box;
    border-radius: 20px; padding: 40px; position: relative; min-height: 90vh;
    display: flex; flex-direction: column; align-items: center;
  }
  .cert-corner { position: absolute; font-size: 1.2rem; color: #FBBF24; }
  .cert-corner.tl { top: 16px; left: 16px; }
  .cert-corner.tr { top: 16px; right: 16px; }
  .cert-corner.bl { bottom: 16px; left: 16px; }
  .cert-corner.br { bottom: 16px; right: 16px; }
  .cert-title { font-family: 'Orbitron', sans-serif; font-size: 2rem; font-weight: 900; text-align: center; background: linear-gradient(90deg,#FF6B9D,#A78BFA,#2DD4BF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom: 6px; }
  .cert-sub { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 3px; color: rgba(232,238,255,0.5); text-align: center; margin-bottom: 30px; }
  .cert-awarded { font-size: 0.85rem; color: rgba(232,238,255,0.6); margin-bottom: 8px; }
  .cert-name { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; font-weight: 900; color: #FBBF24; margin-bottom: 8px; text-align: center; }
  .cert-desc { font-size: 0.9rem; color: rgba(232,238,255,0.6); margin-bottom: 28px; text-align: center; }
  .cert-results { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; width: 100%; margin-bottom: 28px; }
  .cert-res-card { border: 1px solid; border-radius: 12px; padding: 16px; text-align: center; }
  .cert-res-card.rc-v { border-color: var(--visual); }
  .cert-res-card.rc-a { border-color: var(--aural); }
  .cert-res-card.rc-r { border-color: var(--read); }
  .cert-res-card.rc-k { border-color: var(--kine); }
  .cert-res-rank { font-size: 1.5rem; }
  .cert-res-name { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 700; margin: 4px 0; }
  .cert-res-score { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 900; }
  .cert-tip-list { width: 100%; }
  .cert-tip-item { font-size: 0.8rem; color: rgba(232,238,255,0.7); padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .cert-seal { font-size: 4rem; margin: 20px 0 6px; }
  .cert-date { font-size: 0.75rem; color: rgba(232,238,255,0.4); letter-spacing: 1px; }

  /* Responsive */
  @media (max-width: 500px) {
    .card { padding: 24px 18px; }
    .mascots-grid { grid-template-columns: repeat(2,1fr); }
    .options-grid { grid-template-columns: 1fr; }
    .action-row { grid-template-columns: 1fr; }
    .cert-results { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Print Certificate -->
<div class="print-cert" id="printCert">
  <div class="cert-frame">
    <span class="cert-corner tl">✦</span>
    <span class="cert-corner tr">✦</span>
    <span class="cert-corner bl">✦</span>
    <span class="cert-corner br">✦</span>
    <div class="cert-title">Learning Orbit™</div>
    <div class="cert-sub">Helon Universe · Certified Learning Profile</div>
    <div class="cert-awarded">This certificate is proudly awarded to</div>
    <div class="cert-name" id="certName">—</div>
    <div class="cert-desc">for completing the VARK Learning Styles Assessment</div>
    <div class="cert-results" id="certResults"></div>
    <div class="cert-tip-list" id="certTips"></div>
    <div class="cert-seal">🏅</div>
    <div class="cert-date" id="certDate"></div>
  </div>
</div>

<div id="app">
  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-ring-outer">
      <div class="logo-ring-inner">🪐</div>
    </div>
    <div class="logo-title">LEARNING ORBIT™</div>
    <div class="logo-sub">by Helon Universe</div>
  </div>

  <!-- CARD -->
  <div class="card" id="mainCard">
    <!-- Screens rendered by JS -->
  </div>
</div>

<script>
// ── STARS ──────────────────────────────────────────────────
(function initStars(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize() {
    c.width = window.innerWidth; c.height = window.innerHeight;
    stars = Array.from({length: 180}, () => ({
      x: Math.random()*c.width, y: Math.random()*c.height,
      r: Math.random()*1.5+0.3,
      a: Math.random(), da: (Math.random()-0.5)*0.003
    }));
  }
  window.addEventListener('resize', resize); resize();
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s => {
      s.a = Math.max(0.1, Math.min(1, s.a + s.da));
      if(s.a<=0.1||s.a>=1) s.da *= -1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── FLOATING EMOJI PARTICLES ──────────────────────────────
(function spawnParticles(){
  const emojis = ['⭐','🌟','💫','✨','🌙','☄️','🔭','🪐','🛸','🌌'];
  emojis.forEach((em, i) => {
    const el = document.createElement('div');
    el.className = 'emoji-particle'; el.textContent = em;
    el.style.left = (Math.random()*100)+'vw';
    el.style.animationDuration = (18+Math.random()*20)+'s';
    el.style.animationDelay = (i*2.5)+'s';

  });

// ── STATE ─────────────────────────────────────────────────
let state = {
  screen: 'intro',   // intro | quiz | results
  name: '',
  current: 0,
  answers: [],       // array of selected option indices per question
  scores: {V:0, A:0, R:0, K:0}
};

function resetState() {
  state = { screen:'intro', name:'', current:0, answers:[], scores:{V:0,A:0,R:0,K:0} };
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const card = document.getElementById('mainCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = '';
  if(state.screen==='intro')   renderIntro(card);
  if(state.screen==='quiz')    renderQuiz(card);
  if(state.screen==='results') renderResults(card);
}

// ── INTRO ──────────────────────────────────────────────────
function renderIntro(el) {
  el.innerHTML = `
    <div class="intro-headline">Discover Your Learning Style!</div>
    <div class="intro-sub">16 fun space missions to find out how your brain learns best 🚀</div>
    <div class="mascots-grid">
      <div class="mascot-orb">
        <div class="mascot-ring visual"><span class="mascot-emoji">🦁</span></div>
        <span class="mascot-label visual-lbl">Visual</span>
      </div>
      <div class="mascot-orb">
        <div class="mascot-ring aural"><span class="mascot-emoji">🦜</span></div>
        <span class="mascot-label aural-lbl">Aural</span>
      </div>
      <div class="mascot-orb">
        <div class="mascot-ring read"><span class="mascot-emoji">🦉</span></div>
        <span class="mascot-label read-lbl">Reader</span>
      </div>
      <div class="mascot-orb">
        <div class="mascot-ring kine"><span class="mascot-emoji">🐒</span></div>
        <span class="mascot-label kine-lbl">Explorer</span>
      </div>
    </div>
    <div class="input-wrap">
      <label for="nameInput">🌟 What's your name, Space Explorer?</label>
      <input id="nameInput" type="text" placeholder="Enter your name..." maxlength="40" autocomplete="off" value="${escHtml(state.name)}">
    </div>
    <button class="btn-launch" id="btnLaunch" ${state.name.trim().length >= 2 ? '' : 'disabled'}>🚀 LAUNCH INTO ORBIT</button>
  `;
  el.querySelector('#nameInput').addEventListener('input', function(){
    state.name = this.value;
    el.querySelector('#btnLaunch').disabled = this.value.trim().length < 2;
  });
  el.querySelector('#btnLaunch').addEventListener('click', () => {
    state.name = el.querySelector('#nameInput').value.trim();
    if(state.name.length < 2) return;
    state.screen = 'quiz'; state.current = 0; state.answers = [];
    state.scores = {V:0,A:0,R:0,K:0};
    render();
  });
  // focus input
  setTimeout(() => { const inp = el.querySelector('#nameInput'); if(inp) inp.focus(); }, 50);
}

// ── QUIZ ───────────────────────────────────────────────────
function renderQuiz(el) {
  const q = QUESTIONS[state.current];
  const sel = state.answers[state.current] || [];
  const pct = ((state.current) / QUESTIONS.length * 100).toFixed(1);
  const isLast = state.current === QUESTIONS.length - 1;

  const optHtml = q.opts.map((o,i) => {
    const selCls = sel.includes(i) ? `selected-${o.type.toLowerCase()}` : '';
    return `<button class="option-btn ${selCls}" data-idx="${i}" data-type="${o.type}">
      <span class="opt-icon">${o.icon}</span><span>${escHtml(o.text)}</span>
    </button>`;
  }).join('');

  el.innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-header">
        <span class="progress-label">MISSION PROGRESS</span>
        <span class="progress-label">${state.current + 1} / ${QUESTIONS.length}</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="pFill" style="width:${pct}%"></div></div>
    </div>
    <div class="mission-chip">⚡ MISSION ${state.current + 1}</div>
    <span class="q-emoji">${q.emoji}</span>
    <div class="q-text">${escHtml(q.text)}</div>
    <div class="options-grid">${optHtml}</div>
    <button class="btn-next" id="btnNext" ${sel.length > 0 ? '' : 'disabled'}>
      ${isLast ? '🏆 COMPLETE MISSION' : 'NEXT MISSION →'}
    </button>
  `;

  el.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      const idx = parseInt(this.dataset.idx);
      const type = this.dataset.type;
      if(!state.answers[state.current]) state.answers[state.current] = [];
      const arr = state.answers[state.current];
      const pos = arr.indexOf(idx);
      if(pos === -1) arr.push(idx);
      else arr.splice(pos, 1);
      renderQuiz(el);
    });
  });

  el.querySelector('#btnNext').addEventListener('click', () => {
    // Tally scores for current question
    const sel = state.answers[state.current] || [];
    sel.forEach(i => {
      const t = q.opts[i].type;
      state.scores[t]++;
    });
    if(isLast){
      state.screen = 'results'; render(); spawnConfetti();
    } else {
      state.current++; renderQuiz(el);
    }
    // Animate progress fill
    const pf = document.getElementById('pFill');
    if(pf) { const np = ((state.current+1)/QUESTIONS.length*100); pf.style.width = np+'%'; }
  });
}

// ── RESULTS ────────────────────────────────────────────────
function renderResults(el) {
  const sorted = ['V','A','R','K'].map(k => ({...STYLES[k], score: state.scores[k]}))
    .sort((a,b) => b.score - a.score);
  const total = Object.values(state.scores).reduce((s,v) => s+v, 0) || 1;
  const medals = ['🥇','🥈','🥉'];

  const podiumHtml = sorted.slice(0,3).map((s,i) => `
    <div class="result-card ${s.cls}" style="animation: fadeUp ${0.3+i*0.15}s ease both;">
      <span class="rc-medal">${medals[i]}</span>
      <span class="rc-mascot">${s.emoji}</span>
      <div class="rc-body">
        <div class="rc-type" style="color:${s.color}">${s.name.toUpperCase()}</div>
        <div class="rc-desc">${s.desc}</div>
        <div class="rc-tips">${s.tips.map(t => `<span class="rc-tip" style="border-color:${s.color};color:${s.color}">${t}</span>`).join('')}</div>
      </div>
      <div class="rc-score-wrap" style="color:${s.color}">
        <div class="rc-score-num">${s.score}</div>
        <div class="rc-score-pct">${Math.round(s.score/total*100)}%</div>
      </div>
    </div>
  `).join('');

  const sumHtml = sorted.map(s => `
    <div class="sum-row">
      <span class="sum-label" style="color:${s.color}">${s.emoji} ${s.name}</span>
      <div class="sum-track"><div class="sum-fill" style="width:0%;background:${s.color}" data-pct="${Math.round(s.score/total*100)}"></div></div>
      <span class="sum-val" style="color:${s.color}">${s.score}</span>
    </div>
  `).join('');

  el.innerHTML = `
    <div class="results-header">
      <div class="results-title">🎉 ORBIT COMPLETE!</div>
      <div class="results-name">Explorer: <span>${escHtml(state.name)}</span></div>
    </div>
    <div class="podium-grid">${podiumHtml}</div>
    <div class="summary-title">📊 Full Score Summary</div>
    <div class="summary-grid">${sumHtml}</div>
    <div class="action-row">
      <button class="btn-print" id="btnPrint">🖨️ Print Certificate</button>
      <button class="btn-reset" id="btnReset">🔄 New Mission</button>
    </div>
  `;

  setTimeout(() => {
    el.querySelectorAll('.sum-fill').forEach(f => {
      f.style.width = f.dataset.pct + '%';
    });
  }, 100);

  el.querySelector('#btnPrint').addEventListener('click', () => {
    buildCertificate(sorted);
    window.print();
  });
  el.querySelector('#btnReset').addEventListener('click', () => {
    resetState(); render();
  });
}

// ── CERTIFICATE ────────────────────────────────────────────
function buildCertificate(sorted) {
  document.getElementById('certName').textContent = state.name;
  document.getElementById('certDate').textContent = 'Completed: ' + new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const medals = ['🥇','🥈','🥉'];
  const total = Object.values(state.scores).reduce((s,v)=>s+v,0)||1;
  document.getElementById('certResults').innerHTML = sorted.slice(0,3).map((s,i)=>`
    <div class="cert-res-card ${s.cls}">
      <div class="cert-res-rank">${medals[i]}</div>
      <div style="font-size:1.6rem">${s.emoji}</div>
      <div class="cert-res-name" style="color:${s.color}">${s.name.toUpperCase()}</div>
      <div class="cert-res-score" style="color:${s.color}">${s.score}pts · ${Math.round(s.score/total*100)}%</div>
    </div>
  `).join('');
  document.getElementById('certTips').innerHTML = sorted.slice(0,3).map(s=>`
    <div class="cert-tip-item"><strong style="color:${s.color}">${s.emoji} ${s.name}:</strong> ${s.tips.join(' · ')}</div>
  `).join('');
}

// ── CONFETTI ───────────────────────────────────────────────
function spawnConfetti() {
  const colors = ['#FF6B9D','#A78BFA','#2DD4BF','#FBBF24','#fff','#FF8C61'];
  for(let i=0;i<80;i++){
    const div = document.createElement('div');
    div.className = 'confetti-piece';
    div.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*6}px; height:${6+Math.random()*6}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*0.8}s;
      top:0;
    `;
    document.body.appendChild(div);
    setTimeout(()=>div.remove(), 4000);
  }
}

// ── UTILS ──────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────
render();
</script>
